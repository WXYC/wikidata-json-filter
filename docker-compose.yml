services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wikidata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikidata}
      POSTGRES_DB: ${POSTGRES_DB:-wikidata_test}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wikidata}"]
      interval: 2s
      timeout: 5s
      retries: 10
